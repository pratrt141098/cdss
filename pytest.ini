[pytest]
# Default run: pure tests only (no heavy ML deps — safe on all platforms)
# Run heavy tests explicitly: pytest tests/test_generation.py tests/test_ner.py tests/test_ingestion.py
testpaths = tests
addopts =
    --ignore=tests/test_generation.py
    --ignore=tests/test_ner.py
    --ignore=tests/test_ingestion.py
    -v
markers =
    pure: no external dependencies (Ollama, spaCy, pandas, ChromaDB)
    heavy: requires full cdss conda environment with spaCy and pandas
